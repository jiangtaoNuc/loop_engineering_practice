name: CI (coding-harness-viz)

on:
  pull_request:
    paths:
      - 'coding-harness-viz/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'coding-harness-viz/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coding-harness-viz

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: coding-harness-viz/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coding-harness-viz-dist
          path: |
            coding-harness-viz/apps/web/dist
            coding-harness-viz/apps/bff/dist
          retention-days: 7
